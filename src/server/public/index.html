<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>AI-Driven QA Platform</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				background: #1e1e2e;
				color: #cdd6f4;
				height: 100vh;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}

			header {
				background: #181825;
				border-bottom: 1px solid #313244;
				padding: 10px 20px;
				display: flex;
				align-items: center;
				gap: 16px;
			}
			header h1 {
				font-size: 1rem;
				font-weight: 600;
				color: #60a5fa;
			}
			header .subtitle {
				font-size: 0.75rem;
				color: #6c7086;
			}

			.main {
				flex: 1;
				display: flex;
				min-height: 0;
			}

			/* ── Left panel: file tree + editor ── */
			.left-panel {
				width: 55%;
				display: flex;
				flex-direction: column;
				border-right: 1px solid #313244;
			}

			.toolbar {
				background: #181825;
				border-bottom: 1px solid #313244;
				padding: 8px 12px;
				display: flex;
				align-items: center;
				gap: 8px;
			}

			select#file-picker {
				background: #313244;
				color: #cdd6f4;
				border: 1px solid #45475a;
				border-radius: 4px;
				padding: 4px 8px;
				font-size: 0.8rem;
				cursor: pointer;
				flex: 1;
				max-width: 240px;
			}

			button {
				background: #313244;
				color: #cdd6f4;
				border: 1px solid #45475a;
				border-radius: 4px;
				padding: 5px 12px;
				font-size: 0.8rem;
				cursor: pointer;
				transition: background 0.15s;
			}
			button:hover {
				background: #45475a;
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			button.primary {
				background: #2563eb;
				border-color: #2563eb;
				color: #fff;
			}
			button.primary:hover {
				background: #1d4ed8;
			}
			button.danger {
				background: #dc2626;
				border-color: #dc2626;
				color: #fff;
			}
			button.danger:hover {
				background: #b91c1c;
			}
			button.success {
				background: #16a34a;
				border-color: #16a34a;
				color: #fff;
			}

			#editor-container {
				flex: 1;
				min-height: 0;
			}

			/* ── Right panel: run controls + output ── */
			.right-panel {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-height: 0;
			}

			.run-toolbar {
				background: #181825;
				border-bottom: 1px solid #313244;
				padding: 8px 12px;
				display: flex;
				align-items: center;
				gap: 8px;
			}

			.run-toolbar label {
				font-size: 0.8rem;
				color: #6c7086;
				display: flex;
				align-items: center;
				gap: 4px;
				cursor: pointer;
			}

			.btn-report {
				padding: 4px 12px;
				background: #1e3a5f;
				color: #7dd3fc;
				border: 1px solid #2563eb;
				border-radius: 4px;
				font-size: 0.78rem;
				font-weight: 500;
				text-decoration: none;
				white-space: nowrap;
			}
			.btn-report:hover {
				background: #2563eb;
				color: #fff;
			}

			.status-badge {
				margin-left: auto;
				padding: 3px 10px;
				border-radius: 12px;
				font-size: 0.75rem;
				font-weight: 600;
			}
			.status-badge.idle {
				background: #313244;
				color: #6c7086;
			}
			.status-badge.running {
				background: #1e3a5f;
				color: #7dd3fc;
			}
			.status-badge.passed {
				background: #14532d;
				color: #86efac;
			}
			.status-badge.failed {
				background: #7f1d1d;
				color: #fca5a5;
			}

			#run-log {
				flex: 1;
				background: #11111b;
				font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
				font-size: 0.75rem;
				line-height: 1.5;
				padding: 12px;
				overflow-y: auto;
				white-space: pre-wrap;
				word-break: break-all;
			}

			/* ── Bottom panel: health / proposals tabs ── */
			.bottom-panel {
				height: 220px;
				border-top: 1px solid #313244;
				display: flex;
				flex-direction: column;
			}

			.tabs {
				background: #181825;
				border-bottom: 1px solid #313244;
				display: flex;
				gap: 0;
			}
			.tab-btn {
				background: transparent;
				border: none;
				border-bottom: 2px solid transparent;
				border-radius: 0;
				padding: 6px 16px;
				font-size: 0.78rem;
				color: #6c7086;
			}
			.tab-btn:hover {
				background: #1e1e2e;
				color: #cdd6f4;
			}
			.tab-btn.active {
				color: #60a5fa;
				border-bottom-color: #60a5fa;
			}

			.tab-content {
				flex: 1;
				overflow-y: auto;
				padding: 10px 14px;
				font-size: 0.78rem;
			}
			.tab-pane {
				display: none;
			}
			.tab-pane.active {
				display: block;
			}

			table {
				width: 100%;
				border-collapse: collapse;
			}
			th {
				text-align: left;
				color: #6c7086;
				font-weight: 500;
				padding: 4px 8px;
				border-bottom: 1px solid #313244;
			}
			td {
				padding: 4px 8px;
				vertical-align: top;
				border-bottom: 1px solid #1e1e2e;
			}
			.pill {
				display: inline-block;
				padding: 1px 7px;
				border-radius: 8px;
				font-size: 0.7rem;
				font-weight: 600;
			}
			.pill.stable {
				background: #14532d;
				color: #86efac;
			}
			.pill.unstable {
				background: #7f1d1d;
				color: #fca5a5;
			}
			.pill.new {
				background: #1e3a5f;
				color: #7dd3fc;
			}

			.warn-line {
				color: #fb923c;
			}
			.empty-msg {
				color: #6c7086;
				font-style: italic;
				padding: 8px;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>AI-Driven QA Platform</h1>
			<span class="subtitle"
				>BDD &rarr; Playwright &rarr; AI &rarr; Spec generation &rarr;
				Self-healing</span
			>
		</header>

		<div class="main">
			<!-- ── Left: Editor ── -->
			<div class="left-panel">
				<div class="toolbar">
					<select id="file-picker">
						<option value="">Loading…</option>
					</select>
					<button id="btn-save" title="Save (Ctrl+S)">Save</button>
					<button id="btn-lint">Lint</button>
				</div>
				<div id="editor-container"></div>
			</div>

			<!-- ── Right: Run output ── -->
			<div class="right-panel">
				<div class="run-toolbar">
					<button id="btn-run" class="primary">&#9654; Run Pipeline</button>
					<button id="btn-stop" class="danger" disabled>&#9632; Stop</button>
					<label><input type="checkbox" id="chk-fresh" /> --fresh</label>
					<span id="status-badge" class="status-badge idle">Idle</span>
					<a id="btn-report" href="/api/report" target="_blank" style="display:none" class="btn-report">View Report ↗</a>
				</div>
				<div id="run-log"></div>
			</div>
		</div>

		<!-- ── Bottom: Tabs ── -->
		<div class="bottom-panel">
			<div class="tabs">
				<button class="tab-btn active" data-tab="health">
					Selector Health
				</button>
				<button class="tab-btn" data-tab="proposals">Heal Proposals</button>
				<button class="tab-btn" data-tab="lint-output">Lint Output</button>
			</div>
			<div class="tab-content">
				<div class="tab-pane active" id="tab-health">
					<span class="empty-msg"
						>Run the pipeline to populate selector health.</span
					>
				</div>
				<div class="tab-pane" id="tab-proposals">
					<span class="empty-msg">No heal proposals yet.</span>
				</div>
				<div class="tab-pane" id="tab-lint-output">
					<span class="empty-msg"
						>Click "Lint" to check the current scenario file.</span
					>
				</div>
			</div>
		</div>

		<!-- Monaco loader -->
		<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>
		<script>
			require.config({
				paths: {
					vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs',
				},
			})

			require(['vs/editor/editor.main'], function () {
				// ── Register a minimal Gherkin language ──────────────────────────────────
				monaco.languages.register({ id: 'gherkin' })
				monaco.languages.setMonarchTokensProvider('gherkin', {
					tokenizer: {
						root: [
							[
								/^\s*(Feature|Background|Scenario Outline|Scenario|Examples):.*$/,
								'keyword',
							],
							[/^\s*(Given|When|Then|And|But)\b/, 'string'],
							[/#.*$/, 'comment'],
							[/"[^"]*"/, 'string.quoted'],
							[/\|[^|]*/, 'delimiter'],
						],
					},
				})
				monaco.languages.setLanguageConfiguration('gherkin', {
					comments: { lineComment: '#' },
				})

				// ── Editor ───────────────────────────────────────────────────────────────
				const editor = monaco.editor.create(
					document.getElementById('editor-container'),
					{
						value: '',
						language: 'gherkin',
						theme: 'vs-dark',
						fontSize: 13,
						minimap: { enabled: false },
						scrollBeyondLastLine: false,
						wordWrap: 'on',
						automaticLayout: true,
					},
				)

				// ── State ─────────────────────────────────────────────────────────────────
				let currentFile = null
				let runEventSource = null
				let runProc = null

				// ── File picker ──────────────────────────────────────────────────────────
				async function loadFileList() {
					const res = await fetch('/api/scenarios')
					const files = await res.json()
					const picker = document.getElementById('file-picker')
					if (files.length === 0) {
						picker.innerHTML = '<option value="">No .feature files found</option>'
						return
					}
					picker.innerHTML =
						'<option value="all">— All files —</option>' +
						files.map((f) => `<option value="${f.name}">${f.name}</option>`).join('')
					// Default to all-files view
					picker.value = 'all'
					loadAllFiles(files)
				}

				async function loadAllFiles(files) {
					currentFile = null
					editor.updateOptions({ readOnly: true })
					document.getElementById('btn-save').disabled = true
					document.getElementById('btn-lint').disabled = true
					const bar = '─'.repeat(52)
					const sections = files.map((f) => {
						const header = `# ── ${f.name} ${bar.slice(Math.min(f.name.length + 4, bar.length))}`
						const summaryLines = f.content.split('\n')
							.filter((line) => /^\s*(Feature:|Scenario Outline:|Scenario:)/.test(line))
							.map((line) => line.trimEnd())
						return `${header}\n\n${summaryLines.join('\n')}`
					})
					editor.setValue(sections.join('\n\n\n'))
					monaco.editor.setModelMarkers(editor.getModel(), 'lint', [])
				}

				async function loadFile(name) {
					currentFile = name
					editor.updateOptions({ readOnly: false })
					document.getElementById('btn-save').disabled = false
					document.getElementById('btn-lint').disabled = false
					const res = await fetch(`/api/scenarios/${name}`)
					const data = await res.json()
					editor.setValue(data.content)
					monaco.editor.setModelMarkers(editor.getModel(), 'lint', [])
				}

				document
					.getElementById('file-picker')
					.addEventListener('change', async (e) => {
						const val = e.target.value
						if (val === 'all') {
							const res = await fetch('/api/scenarios')
							const files = await res.json()
							loadAllFiles(files)
						} else if (val) {
							loadFile(val)
						}
					})

				// ── Save ──────────────────────────────────────────────────────────────────
				async function saveFile() {
					if (!currentFile) return
					await fetch(`/api/scenarios/${currentFile}`, {
						method: 'PUT',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ content: editor.getValue() }),
					})
					document.getElementById('btn-save').textContent = 'Saved ✓'
					setTimeout(() => {
						document.getElementById('btn-save').textContent = 'Save'
					}, 1500)
				}

				document.getElementById('btn-save').addEventListener('click', saveFile)
				editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveFile)

				// ── Lint ──────────────────────────────────────────────────────────────────
				async function runLint() {
					const lintPane = document.getElementById('tab-lint-output')
					activateTab('lint-output')
					lintPane.innerHTML = '<span class="empty-msg">Linting…</span>'

					const res = await fetch('/api/lint', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ content: editor.getValue() }),
					})
					const data = await res.json()
					const warnings = data.warnings ?? []

					if (warnings.length === 0) {
						lintPane.innerHTML =
							'<span class="empty-msg">No warnings — all steps canonical ✓</span>'
					} else {
						lintPane.innerHTML = warnings
							.map(
								(w) => `<div class="warn-line">⚠ ${escHtml(w.message)}</div>`,
							)
							.join('')
					}
				}

				document.getElementById('btn-lint').addEventListener('click', runLint)

				// ── Run Pipeline ──────────────────────────────────────────────────────────
				const runLog = document.getElementById('run-log')
				const statusBadge = document.getElementById('status-badge')

				const btnReport = document.getElementById('btn-report')

				function setStatus(s) {
					statusBadge.className = `status-badge ${s}`
					statusBadge.textContent = s.charAt(0).toUpperCase() + s.slice(1)
					btnReport.style.display = (s === 'passed' || s === 'failed') ? 'inline-block' : 'none'
				}

				function appendLog(line) {
					runLog.textContent += line + '\n'
					runLog.scrollTop = runLog.scrollHeight
				}

				document
					.getElementById('btn-run')
					.addEventListener('click', async () => {
						if (runEventSource) return
						runLog.textContent = ''
						setStatus('running')
						document.getElementById('btn-run').disabled = true
						document.getElementById('btn-stop').disabled = false

						const fresh = document.getElementById('chk-fresh').checked
						const pickerVal = document.getElementById('file-picker').value
						const targets = pickerVal === 'all' ? [] : [pickerVal]

						// SSE via POST — use fetch + ReadableStream
						const ctrl = new AbortController()
						runProc = ctrl

						try {
							const res = await fetch('/api/run', {
								method: 'POST',
								headers: { 'Content-Type': 'application/json' },
								body: JSON.stringify({ fresh, targets }),
								signal: ctrl.signal,
							})

							const reader = res.body.getReader()
							const decoder = new TextDecoder()
							let buf = ''

							while (true) {
								const { done, value } = await reader.read()
								if (done) break
								buf += decoder.decode(value, { stream: true })
								const parts = buf.split('\n\n')
								buf = parts.pop() ?? ''
								for (const part of parts) {
									const lines = part.split('\n')
									let eventType = 'log'
									let eventData = ''
									for (const line of lines) {
										if (line.startsWith('event: '))
											eventType = line.slice(7).trim()
										else if (line.startsWith('data: ')) {
											try {
												eventData = JSON.parse(line.slice(6))
											} catch {
												eventData = line.slice(6)
											}
										}
									}
									if (eventType === 'log') appendLog(eventData)
									else if (eventType === 'done') {
										setStatus(eventData === 'PASSED' ? 'passed' : 'failed')
										refreshHealth()
										refreshProposals()
									} else if (eventType === 'error') {
										appendLog('[ERROR] ' + eventData)
										setStatus('failed')
									}
								}
							}
						} catch (err) {
							if (err.name !== 'AbortError') appendLog('[ERROR] ' + err.message)
							setStatus('failed')
						}

						runProc = null
						document.getElementById('btn-run').disabled = false
						document.getElementById('btn-stop').disabled = true
					})

				document.getElementById('btn-stop').addEventListener('click', () => {
					if (runProc) {
						runProc.abort()
						runProc = null
					}
					setStatus('idle')
					document.getElementById('btn-run').disabled = false
					document.getElementById('btn-stop').disabled = true
				})

				// ── Selector Health ───────────────────────────────────────────────────────
				async function refreshHealth() {
					const pane = document.getElementById('tab-health')
					const res = await fetch('/api/selector-health')
					const data = await res.json()
					const entries = Object.entries(data)
					if (entries.length === 0) {
						pane.innerHTML =
							'<span class="empty-msg">No selector health data yet.</span>'
						return
					}
					entries.sort((a, b) => {
						const ra = a[1].failCount / Math.max(a[1].runCount, 1)
						const rb = b[1].failCount / Math.max(b[1].runCount, 1)
						return rb - ra
					})
					const rows = entries
						.map(([sel, rec]) => {
							const rate =
								rec.runCount > 0
									? ((rec.failCount / rec.runCount) * 100).toFixed(0)
									: '—'
							const status =
								rec.runCount < 3 ? 'new' : rate > 20 ? 'unstable' : 'stable'
							return `<tr>
        <td><code>${escHtml(sel)}</code></td>
        <td>${rec.runCount}</td>
        <td>${rec.failCount}</td>
        <td>${rate}%</td>
        <td><span class="pill ${status}">${status}</span></td>
      </tr>`
						})
						.join('')
					pane.innerHTML = `<table>
      <thead><tr><th>Selector</th><th>Runs</th><th>Failures</th><th>Fail Rate</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`
				}

				// ── Heal Proposals ────────────────────────────────────────────────────────
				async function refreshProposals() {
					const pane = document.getElementById('tab-proposals')
					const res = await fetch('/api/output')
					const { files } = await res.json()
					const patchFiles = (files ?? []).filter(
						(f) => f.includes('heal-proposals') && f.endsWith('.patch.json'),
					)
					if (patchFiles.length === 0) {
						pane.innerHTML =
							'<span class="empty-msg">No heal proposals yet. Run <code>npm run heal</code> after failures.</span>'
						return
					}
					const rows = []
					for (const f of patchFiles) {
						const dataRes = await fetch(`/api/output/${f}`)
						const patch = await dataRes.json()
						for (const p of patch.proposals ?? []) {
							rows.push(`<tr>
          <td><code>${escHtml(p.oldSelector)}</code></td>
          <td><code>${escHtml(p.newSelector)}</code></td>
          <td>${(p.confidence * 100).toFixed(0)}%</td>
        </tr>`)
						}
					}
					if (rows.length === 0) {
						pane.innerHTML =
							'<span class="empty-msg">All selectors resolved — no replacements needed.</span>'
						return
					}
					pane.innerHTML = `<table>
      <thead><tr><th>Old Selector</th><th>Suggested Replacement</th><th>Confidence</th></tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>`
				}

				// ── Tab switching ─────────────────────────────────────────────────────────
				function activateTab(name) {
					document
						.querySelectorAll('.tab-btn')
						.forEach((b) =>
							b.classList.toggle('active', b.dataset.tab === name),
						)
					document
						.querySelectorAll('.tab-pane')
						.forEach((p) =>
							p.classList.toggle('active', p.id === `tab-${name}`),
						)
				}
				document.querySelectorAll('.tab-btn').forEach((b) => {
					b.addEventListener('click', () => activateTab(b.dataset.tab))
				})

				// ── Helpers ───────────────────────────────────────────────────────────────
				function escHtml(s) {
					return String(s)
						.replace(/&/g, '&amp;')
						.replace(/</g, '&lt;')
						.replace(/>/g, '&gt;')
				}

				// ── Init ──────────────────────────────────────────────────────────────────
				loadFileList()
				refreshHealth()
				refreshProposals()
			})
		</script>
	</body>
</html>
